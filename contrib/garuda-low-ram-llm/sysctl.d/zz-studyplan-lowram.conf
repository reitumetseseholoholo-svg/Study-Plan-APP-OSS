# VM behaviour for low-RAM desktop + local LLM
# Install: sudo cp zz-studyplan-lowram.conf /etc/sysctl.d/ && sudo sysctl --system
# Basename *zz-* is required so these keys override Garuda's 99-sysctl-garuda.conf.

# Slightly more reserved free memory for sudden LLM allocations
vm.min_free_kbytes = 90112

# Prefer keeping application pages over file cache under pressure (desktop feel)
vm.swappiness = 35

# Less aggressive inode/dentry reclaim than default 100 (fewer surprise stalls)
vm.vfs_cache_pressure = 60
