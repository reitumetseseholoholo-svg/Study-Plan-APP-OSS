name: linux-ci

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
      - "feature/**"

jobs:
  lint-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-4.0 xvfb
      - name: Install test/lint deps
        run: |
          python -m pip install --upgrade pip
          pip install pyright pytest
      - name: GTK lint
        run: python tools/gtk4_lint.py
      - name: Pyright
        run: pyright studyplan_app.py studyplan_ai_tutor.py studyplan_engine.py studyplan tests

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-4.0 xvfb
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Unit tests
        run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: [lint-type, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-4.0 xvfb
      - name: Strict dialog smoke
        run: xvfb-run -a timeout 180s python studyplan_app.py --dialog-smoke-strict

  perf:
    runs-on: ubuntu-latest
    needs: [lint-type, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Evaluate strict perf gate
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/release/* ]]; then
            REQUIRE_OLLAMA=1
          else
            REQUIRE_OLLAMA=0
          fi
          python tools/run_perf_benchmark.py \
            --prompts-file tests/fixtures/perf_prompts.json \
            --report perf_report.json \
            --require-ollama "${REQUIRE_OLLAMA}" \
            --allow-warn 0
      - name: Upload perf report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: perf_report.json
