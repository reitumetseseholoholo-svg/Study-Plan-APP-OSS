name: Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version for the installer"
        default: "0.1.0"
        required: false
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    env:
      APP_NAME: "ACCA Study Assistant"
      PUBLISHER: "Lereko Seholoholo"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $version = "${{ github.ref_name }}"
            }
          }
          if ($version -and $version.StartsWith("v")) {
            $version = $version.Substring(1)
          }
          if (-not $version) { $version = "0.1.0" }
          $basename = "$env:APP_NAME-$version-Setup"
          $basename = $basename -replace "\s+", "-"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "INSTALLER_BASENAME=$basename" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-python-wheel
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-python-cairo
            mingw-w64-x86_64-libadwaita

      - name: Install Python Dependencies
        shell: msys2 {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Compile Check
        shell: msys2 {0}
        run: |
          python -m py_compile studyplan_app.py
          python -m py_compile studyplan_engine.py
          python -m py_compile studyplan_ai_tutor.py
          python -m py_compile studyplan/platform_compat.py

      - name: Build App (PyInstaller)
        shell: msys2 {0}
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name "$APP_NAME" \
            --add-data "modules;modules" \
            --add-data "studyplan;studyplan" \
            --add-data "acca_f7_500_questions.json;." \
            --add-data "module_schema.json;." \
            --hidden-import studyplan \
            --hidden-import studyplan.platform_compat \
            --hidden-import studyplan.config \
            --hidden-import studyplan.contracts \
            --hidden-import studyplan.services \
            --hidden-import studyplan.fsrs \
            --hidden-import studyplan.ai \
            --hidden-import studyplan.data \
            --hidden-import studyplan.domain \
            --hidden-import studyplan_engine \
            --hidden-import studyplan_ai_tutor \
            --hidden-import studyplan_app_path_utils \
            --hidden-import studyplan_app_kpi_routing \
            --hidden-import studyplan_app_runtime_helpers \
            --hidden-import studyplan_file_safety \
            --hidden-import studyplan_theme \
            --hidden-import studyplan_ui_runtime \
            --hidden-import studyplan_ui_state_store \
            --collect-all gi \
            studyplan_app.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes

      - name: Build Installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\windows\Output | Out-Null
          iscc "/DAppName=$env:APP_NAME" "/DAppVersion=$env:APP_VERSION" "/DPublisher=$env:PUBLISHER" "/DOutputBaseFilename=$env:INSTALLER_BASENAME" "build\\windows\\installer.iss"

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.APP_VERSION }}
          path: build\windows\Output\${{ env.INSTALLER_BASENAME }}.exe
